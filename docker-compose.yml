networks:
  trading-network:
    driver: bridge
    name: ${DOCKER_NETWORK:-trading-network}

services:
  # --- RELATIONAL LAYER (SQL) ---
  # 1. Identity DB (MySQL)
  broker-identity-db:
    image: mysql:8.0
    container_name: broker-identity-db
    restart: always
    environment:
      MYSQL_DATABASE: ${BROKER_IDENTITY_DB_NAME}
      MYSQL_USER: ${BROKER_DB_USER}
      MYSQL_PASSWORD: ${BROKER_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${BROKER_DB_ROOT_PASS}
    ports:
      - '3306:3306'
    volumes:
      - ./data/mysql/identity:/var/lib/mysql
    networks:
      - trading-network

  # 2. Wallet DB (MySQL)
  broker-wallet-db:
    image: mysql:8.0
    container_name: broker-wallet-db
    restart: always
    environment:
      MYSQL_DATABASE: ${BROKER_WALLET_DB_NAME}
      MYSQL_USER: ${BROKER_DB_USER}
      MYSQL_PASSWORD: ${BROKER_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${BROKER_DB_ROOT_PASS}
    ports:
      - '3307:3306'
    volumes:
      - ./data/mysql/wallet:/var/lib/mysql
    networks:
      - trading-network

  # 3. Order DB (MySQL)
  broker-order-db:
    image: mysql:8.0
    container_name: broker-order-db
    restart: always
    environment:
      MYSQL_DATABASE: ${BROKER_ORDER_DB_NAME}
      MYSQL_USER: ${BROKER_DB_USER}
      MYSQL_PASSWORD: ${BROKER_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${BROKER_DB_ROOT_PASS}
    ports:
      - '3308:3306'
    volumes:
      - ./data/mysql/order:/var/lib/mysql
    networks:
      - trading-network

  # 4. Asset DB (MySQL)
  broker-asset-db:
    image: mysql:8.0
    container_name: broker-asset-db
    restart: always
    environment:
      MYSQL_DATABASE: ${BROKER_ASSET_DB_NAME}
      MYSQL_USER: ${BROKER_DB_USER}
      MYSQL_PASSWORD: ${BROKER_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${BROKER_DB_ROOT_PASS}
    ports:
      - '3309:3306'
    volumes:
      - ./data/mysql/asset:/var/lib/mysql
    networks:
      - trading-network

  # 5. B3 Core DB (PostgreSQL)
  b3-core-db:
    image: postgres:15
    container_name: b3-core-db
    restart: always
    environment:
      POSTGRES_DB: ${B3_CORE_DB}
      POSTGRES_USER: ${B3_CORE_USER}
      POSTGRES_PASSWORD: ${B3_CORE_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - trading-network

  # --- NOSQL LAYER (MONGO) ---
  # A single instance managing two logical databases
  broker-mongodb:
    image: mongo:6.0
    container_name: broker-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - ./data/mongo:/data/db
    networks:
      - trading-network

  # --- CACHE LAYER (REDIS) ---
  # Lightweight instances isolated by domain
  broker-asset-cache:
    image: redis:7.0-alpine
    container_name: broker-asset-cache
    ports:
      - '${REDIS_BROKER_ASSET_PORT}:6379'
    networks:
      - trading-network

  b3-market-cache:
    image: redis:7.0-alpine
    container_name: b3-market-cache
    ports:
      - '${REDIS_B3_MARKET_PORT}:6379'
    networks:
      - trading-network

  # --- MESSAGING LAYER ---
  # RabbitMQ (Official)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: trading-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin_pass}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_UI_PORT:-15672}:15672'
    networks:
      - trading-network

  # Kafka (Official Apache Kafka — more lightweight and stable for KRaft)
  kafka:
    image: apache/kafka:3.7.0
    container_name: trading-kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://finance-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - '9092:9092'
    networks:
      - trading-network

  # --- OBSERVABILITY LAYER (Centered) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    restart: always
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    networks:
      - trading-network

  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Senha inicial
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3000}:3000'
    networks:
      - trading-network
